<!DOCTYPE html>
<html>
  <head>
    <title>3D Cube!</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    
    <link rel="stylesheet" href="style.css">
    
    <script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/josephg/noisejs@master/perlin.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/stats.js/16/Stats.min.js"></script>
  </head>
  <body>
    
    <div id='crosshair'>+</div>
    
    <div id="ui" style="position:fixed; bottom:20px; left:20px; color:white; font-family:monospace; background:rgba(0,0,0,0.5); padding:10px; pointer-events:none;">
      <p id="targetl">placeholder</p>
    </div>

    <div id="ui-layer">
        
        <div id="debug">Action: None</div>

        <div id="d-pad">
            <div class="btn" id="btn-up" data-action="Move Forward">W</div>
            <div class="btn" id="btn-left" data-action="Move Left">A</div>
            <div id="btn-center" class="btn" data-action="Sneak"></div>
            <div class="btn" id="btn-right" data-action="Move Right">D</div>
            <div class="btn" id="btn-down" data-action="Move Backward">S</div>
        </div>

        <div id="action-buttons">
            <div class="btn action-btn" id="btn-break" data-action="Break/Attack">Hit</div>
            <div class="btn action-btn" id="btn-place" data-action="Place Block">Use</div>
            <div class="btn action-btn" id="btn-jump" data-action="Jump">Jump</div>
        </div>
    </div>
    <script src="script.js"></script>
  </body>
</html>
