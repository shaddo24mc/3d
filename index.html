<!DOCTYPE html>
<html>
  <head>
    <title>3D Cube</title>
    <style>
        body { margin: 0; overflow: hidden; font-family: sans-serif; }
        /* Layer text over the 3D scene */
        #targetl {
            position: absolute; /* This is the key */
            top: 10px;
            left: 10px;
            color: red; /* Make sure you can see it against the background */
            z-index: 1;    /* Ensures it stays on top of the canvas */
        }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>
  </head>
  <body>
    <div id='crosshair'>+</div>
    <p id="targetl">placeholder</p>
    <script src="script.js"></script>
  </body>
</html>
